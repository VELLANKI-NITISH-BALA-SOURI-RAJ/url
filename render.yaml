services:
  - type: web
    name: url-shortener
    env: python
    region: oregon
    plan: free
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: postgresql+asyncpg://postgres:password@<POSTGRES_HOST>:5432/url_shortener
      - key: REDIS_URL
        value: redis://<REDIS_HOST>:6379/0
      - key: BASE_URL
        value: https://<YOUR_RENDER_SERVICE>.onrender.com
