databases:
  - name: url_shortener_db
    plan: free

services:
  - type: web
    name: url-shortener
    env: python
    region: oregon
    plan: free
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: url_shortener_db
          property: connectionString
      - key: REDIS_URL
        value: memory
      - key: BASE_URL
        value: https://url-wjd6.onrender.com
